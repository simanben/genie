<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Genie's Wish Portal</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div id="startOverlay" class="start-overlay">
    <div class="start-popup">
      <h1>Genie's Wish Portal</h1>

      <p>
        Stap binnen in een magische AR-wereld. Zoek de lamp, klik drie keer en kies jouw wens.
      </p>

      <button id="startButton">Ga verder</button>
    </div>
  </div>

  <div id="hintText" class="hint-text">
    Welkom reiziger... zoek de magische lamp.
  </div>

  <div id="clickCounter" class="click-counter">
    Lamp magie: 0 / 3
  </div>

  <div id="wishPanel" class="wish-panel">
    <h2>Kies jouw wens</h2>

    <p>
      De Genie is verschenen. Eén keuze opent jouw nieuwe wereld.
    </p>

    <div class="wish-buttons">
      <button onclick="chooseWish('money')">Rijkdom</button>
      <button onclick="chooseWish('love')">Liefde</button>
      <button onclick="chooseWish('adventure')">Avontuur</button>
    </div>
  </div>

  <button id="resetButton" class="reset-button">
    Terug naar begin
  </button>

  <a-scene
    id="scene"
    embedded
    renderer="antialias: true"
    background="color: #16002E"
    fog="type: exponential; color: #16002E; density: 0.035">

    <a-assets>
      <img id="richSky" src="assets/rich_sky.jpg">

      <a-asset-item id="lampModel" src="assets/genie_lamp.glb"></a-asset-item>
      <a-asset-item id="genieModel" src="assets/genie_-_alexander_shatohin.glb"></a-asset-item>
      <a-asset-item id="candlesModel" src="assets/candles_asset_pack.glb"></a-asset-item>
      <a-asset-item id="carpetModel" src="assets/aladdins_magic_carpet.glb"></a-asset-item>
      <a-asset-item id="portalModel" src="assets/mana_fantasy_teamed_portal.glb"></a-asset-item>
      <a-asset-item id="crystalModel" src="assets/purple_crystal.glb"></a-asset-item>
      <a-asset-item id="witchStuffModel" src="assets/loose_magic_witchy_stuff..glb"></a-asset-item>

      <a-asset-item id="moneyModel" src="assets/cash_pile_and_money_stacks.glb"></a-asset-item>
      <a-asset-item id="coinsModel" src="assets/pile_of_coins.glb"></a-asset-item>
      <a-asset-item id="goldBarsModel" src="assets/gold_bars.glb"></a-asset-item>
      <a-asset-item id="chestModel" src="assets/chest_01.glb"></a-asset-item>
      <a-asset-item id="palaceModel" src="assets/raj_mahal_royal_palace.glb"></a-asset-item>

      <a-asset-item id="heartModel" src="assets/heart_in_love.glb"></a-asset-item>
      <a-asset-item id="pumpingHeartModel" src="assets/pumping_heart_model.glb"></a-asset-item>
      <a-asset-item id="roseModel" src="assets/pink_rose.glb"></a-asset-item>
      <a-asset-item id="archModel" src="assets/arch.glb"></a-asset-item>

      <a-asset-item id="shipModel" src="assets/sailing_ship_model.glb"></a-asset-item>
      <a-asset-item id="jungleModel" src="assets/jungle_environment.glb"></a-asset-item>
      <a-asset-item id="templeGateModel" src="assets/garden_temple_gate.glb"></a-asset-item>
      <a-asset-item id="mapModel" src="assets/old_map_3d_model.glb"></a-asset-item>
      <a-asset-item id="compassModel" src="assets/pirate_compass.glb"></a-asset-item>
    </a-assets>

    <a-sky id="sky" color="#23004D"></a-sky>

    <a-entity light="type: ambient; intensity: 0.55; color: #BFA7FF"></a-entity>

    <a-entity
      id="mainLight"
      light="type: directional; intensity: 0.9; color: #FFFFFF"
      position="3 7 4">
    </a-entity>

    <a-entity
      id="lampLight"
      light="type: point; intensity: 1.6; distance: 12; color: #FFD166"
      position="0 2 -5">
    </a-entity>

    <a-box
      id="platform"
      position="0 -0.1 0"
      width="34"
      height="0.2"
      depth="34"
      color="#4B168C">
    </a-box>

    <a-box class="platform-border" position="0 0.2 -17" width="34" height="0.4" depth="0.3" color="#C77DFF"></a-box>
    <a-box class="platform-border" position="0 0.2 17" width="34" height="0.4" depth="0.3" color="#C77DFF"></a-box>
    <a-box class="platform-border" position="-17 0.2 0" width="0.3" height="0.4" depth="34" color="#C77DFF"></a-box>
    <a-box class="platform-border" position="17 0.2 0" width="0.3" height="0.4" depth="34" color="#C77DFF"></a-box>

    <a-text
      id="worldTitle"
      value="Genie's Wish Portal"
      position="-5.2 4 -8"
      color="#FFFFFF"
      width="6"
      align="center">
    </a-text>

    <a-text
      id="worldInstruction"
      value="Vind de lamp en klik drie keer om de Genie te roepen"
      position="-5.2 3.35 -8"
      color="#E0AAFF"
      width="5.5"
      align="center">
    </a-text>

    <!-- STARTWERELD OBJECTEN -->
    <a-gltf-model
      class="base-world"
      id="magicCarpet"
      src="#carpetModel"
      position="0 0.03 -5"
      rotation="0 0 0"
      scale="0.55 0.55 0.55">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="magicPortal"
      src="#portalModel"
      position="-0.80 -6 -25"
      rotation="0 0 0"
      scale="20 20 20">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="crystalLeft"
      src="#crystalModel"
      position="-6 0 -7"
      rotation="0 25 0"
      scale="0.12 0.12 0.12">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="crystalRight"
      src="#crystalModel"
      position="6 0 -7"
      rotation="0 -25 0"
      scale="0.12 0.12 0.12">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="witchStuffLeft"
      src="#witchStuffModel"
      position="-3 0.08 -3"
      rotation="0 35 0"
      scale="15 15 15">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="witchStuffRight"
      src="#witchStuffModel"
      position="3 0.08 -3"
      rotation="0 -35 0"
      scale="15 15 15">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="candlesLeft"
      src="#candlesModel"
      position="-5 0 -4"
      rotation="0 35 0"
      scale="0.018 0.018 0.018">
    </a-gltf-model>

    <a-gltf-model
      class="base-world"
      id="candlesRight"
      src="#candlesModel"
      position="5 0 -4"
      rotation="0 -35 0"
      scale="0.018 0.018 0.018">
    </a-gltf-model>

    <!-- LAMP -->
    <a-gltf-model
      id="lamp"
      class="base-world clickable"
      src="#lampModel"
      position="0 0.12 -5"
      rotation="0 90 0"
      scale="0.025 0.025 0.025"
      animation="property: position; to: 0 0.22 -5; dir: alternate; dur: 1500; loop: true">
    </a-gltf-model>

    <a-torus
      id="lampAura"
      class="base-world"
      position="0 0.06 -5"
      rotation="90 0 0"
      radius="1.15"
      radius-tubular="0.035"
      color="#FFD166"
      opacity="0.85"
      animation="property: scale; to: 1.25 1.25 1.25; dir: alternate; dur: 1200; loop: true">
    </a-torus>

    <!-- GENIE -->
    <a-gltf-model
      id="genie"
      src="#genieModel"
      visible="false"
      position="0 5 -5"
      rotation="0 0 0"
      scale="0.25 0.25 0.25"
      animation="property: position; to: 0 1.88 -5; dir: alternate; dur: 2200; loop: true">
    </a-gltf-model>

    <!-- RIJKDOMWERELD -->
    <a-gltf-model
      class="money-world"
      id="royalPalace"
      src="#palaceModel"
      visible="false"
      position="0 -0.85 -11"
      rotation="0 180 0"
      scale="0.034 0.034 0.034">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#moneyModel"
      visible="false"
      position="0 0.05 -13.5"
      rotation="0 180 0"
      scale="2.2 2.2 2.2">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#coinsModel"
      visible="false"
      position="-3.5 0.04 -12"
      rotation="0 20 0"
      scale="2.6 2.6 2.6">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#coinsModel"
      visible="false"
      position="3.5 0.04 -12"
      rotation="0 -20 0"
      scale="2.6 2.6 2.6">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#goldBarsModel"
      visible="false"
      position="-2.5 0.05 -16"
      rotation="0 30 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#goldBarsModel"
      visible="false"
      position="2.5 0.05 -16"
      rotation="0 -30 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#chestModel"
      visible="false"
      position="-5 0.75 -14.5"
      rotation="0 40 0"
      scale="0.75 0.75 0.75">
    </a-gltf-model>

    <a-gltf-model
      class="money-world"
      src="#chestModel"
      visible="false"
      position="5 0.75 -14.5"
      rotation="0 -40 0"
      scale="0.75 0.75 0.75">
    </a-gltf-model>

    <a-text
      class="money-world"
      visible="false"
      value="Rijkdom: goud, schatten en luxe"
      position="5.2 3.45 -8"
      color="#FFF3B0"
      width="5.5"
      align="center">
    </a-text>

    <!-- LIEFDESWERELD -->
    <a-gltf-model
      class="love-world"
      src="#archModel"
      visible="false"
      position="0 0 -7"
      rotation="0 0 0"
      scale="2.2 2.2 2.2">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#pumpingHeartModel"
      visible="false"
      position="-1.6 1.25 -5.7"
      rotation="0 0 0"
      scale="0.018 0.018 0.018"
      animation="property: scale; to: 0.023 0.023 0.023; dir: alternate; dur: 900; loop: true">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#heartModel"
      visible="false"
      position="0 1.35 -5.7"
      rotation="0 180 0"
      scale="0.012 0.012 0.012"
      animation="property: scale; to: 0.014 0.014 0.014; dir: alternate; dur: 1300; loop: true">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#pumpingHeartModel"
      visible="false"
      position="1.6 1.25 -5.7"
      rotation="0 0 0"
      scale="0.018 0.018 0.018"
      animation="property: scale; to: 0.023 0.023 0.023; dir: alternate; dur: 900; loop: true">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#roseModel"
      visible="false"
      position="-4 0 -5"
      rotation="0 35 0"
      scale="2.2 2.2 2.2">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#roseModel"
      visible="false"
      position="4 0 -5"
      rotation="0 -35 0"
      scale="2.2 2.2 2.2">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#roseModel"
      visible="false"
      position="-2.5 0 -8"
      rotation="0 0 0"
      scale="1.8 1.8 1.8">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#roseModel"
      visible="false"
      position="2.5 0 -8"
      rotation="0 0 0"
      scale="1.8 1.8 1.8">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#candlesModel"
      visible="false"
      position="-5 0 -7"
      rotation="0 35 0"
      scale="0.018 0.018 0.018">
    </a-gltf-model>

    <a-gltf-model
      class="love-world"
      src="#candlesModel"
      visible="false"
      position="5 0 -7"
      rotation="0 -35 0"
      scale="0.018 0.018 0.018">
    </a-gltf-model>

    <a-text
      class="love-world"
      visible="false"
      value="Liefde: warmte, hartjes en zachte magie"
      position="5.2 3.45 -8"
      color="#FFE5EC"
      width="5.5"
      align="center">
    </a-text>

    <!-- AVONTUURWERELD -->
    <a-gltf-model
      class="adventure-world"
      src="#jungleModel"
      visible="false"
      position="-5 -3 4"
      rotation="0 180 0"
      scale="0.007 0.007 0.007">
    </a-gltf-model>

    <a-gltf-model
      class="adventure-world"
      src="#templeGateModel"
      visible="false"
      position="0 1.15 6"
      rotation="0 180 0"
      scale="0.08 0.08 0.08">
    </a-gltf-model>

    <a-gltf-model
      class="adventure-world"
      id="sailingShip"
      src="#shipModel"
      visible="false"
      position="-2 -20 -2"
      rotation="0 180 0"
      scale="1.2 1.2 1.2">
    </a-gltf-model>

    <a-gltf-model
      class="adventure-world"
      src="#mapModel"
      visible="false"
      position="-2 0.05 7"
      rotation="0 15 0"
      scale="0.8 0.8 0.8">
    </a-gltf-model>

    <a-gltf-model
      class="adventure-world"
      src="#compassModel"
      visible="false"
      position="2 0.35 6"
      rotation="0 -20 0"
      scale="0.35 0.35 0.35">
    </a-gltf-model>

    <a-text
      class="adventure-world"
      visible="false"
      value="Avontuur: jungle, tempel en ontdekking"
      position="5.2 3.45 -8"
      color="#CAF0F8"
      width="5.5"
      align="center">
    </a-text>

    <!-- CAMERA / SPELER -->
    <a-entity
      id="player"
      position="0 1.6 8"
      camera
      look-controls="pointerLockEnabled: false"
      wasd-controls="acceleration: 25"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable">
    </a-entity>

  </a-scene>

<script src="js/app.js?v=2"></script>

</body>

</html>
